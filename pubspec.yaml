name: NOA
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8 
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  image_picker: ^1.1.2
  firebase_storage: ^12.4.10
  intl: ^0.20.2
  share_plus: ^7.2.2
  cached_network_image: ^3.4.1
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  # ESTA LÍNEA ES LA QUE FALTA PARA QUE EL COMANDO FUNCIONE:
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logoNOA.png
    - assets/images/LOGONOA2.png

# Esta sección debe ir pegada al margen izquierdo
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logoNOA.png"
  adaptive_icon_background: "#FCF6F0"
  adaptive_icon_foreground: "assets/images/logoNOA.png"